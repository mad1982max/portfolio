<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Developer Portfolio</title>
    <script>
        // GitHub Pages SPA redirect trick
        // Encodes the path into a query param and redirects to index.html
        var l = window.location;
        l.replace(
            l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1).join('/') +
            '/?p=' +
            encodeURIComponent(l.pathname + l.search) +
            '&q=' +
            encodeURIComponent(l.hash)
        );
    </script>
</head>

<body></body>

</html>
